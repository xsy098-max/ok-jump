name: "ok-jump"
uac: true
profiles:
  - name: "China"
    git_url: "https://cnb.cool/xsy098-max/ok-jump.git"
    admin: true
    main_script: "main.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: true
    show_add_defender: true
    pip_args: "--timeout 180 -i https://pypi.tuna.tsinghua.edu.cn/simple"

  - name: "Debug"
    git_url: "https://cnb.cool/xsy098-max/ok-jump.git"
    main_script: "main_debug.py"
    use_pythonw: false
