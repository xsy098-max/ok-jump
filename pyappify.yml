name: "ok-jump"
uac: true
profiles:
  - name: "China"
    git_url: "https://github.com/xsy098-max/ok-jump.git"
    admin: true
    main_script: "main.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: true
    show_add_defender: true
    pip_args: "-i https://mirrors.aliyun.com/pypi/simple"

  - name: "Debug"
    git_url: "https://github.com/xsy098-max/ok-jump.git"
    main_script: "main_debug.py"
    admin: true
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: false
    pip_args: "-i https://mirrors.aliyun.com/pypi/simple"
