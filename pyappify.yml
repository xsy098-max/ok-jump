name: "ok-jump"
uac: true
profiles:
  - name: "China"
    git_url: "https://github.com/xsy098-max/ok-jump.git"
    admin: true
    main_script: "main.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: true
    show_add_defender: true
    pip_args: "--index-url https://mirrors.cloud.tencent.com/pypi/simple --extra-index-url https://pypi.org/simple --timeout 300 --retries 3"

  - name: "Debug"
    git_url: "https://github.com/xsy098-max/ok-jump.git"
    main_script: "main_debug.py"
    use_pythonw: false
